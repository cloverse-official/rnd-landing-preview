<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신청 완료 — RnD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../shared/base.css" />
  <link rel="stylesheet" href="blend.css" />
</head>
<body>
  <nav class="nav">
    <div class="inner">
      <a class="brand-logo" href="index.html">
        <span class="logo-mark"><img src="../shared/rnd-logo.png" alt="RnD" /></span>
        <span class="wordmark">RnD</span>
      </a>
    </div>
  </nav>

  <div class="done-wrap">
    <div class="check">✓</div>
    <h1>신청이<br />접수되었습니다.</h1>
    <p>같은 깊이의 인연을 향한 첫걸음을 떼셨어요. 환영합니다.</p>

    <div class="qnum">
      <div class="lbl">나의 사전가입 순번</div>
      <div class="v" id="qnum-v">#---</div>
      <div class="note" style="margin-top:8px">실제 순번 자동 표시 <span class="todo">중계기 연동 추가 필요</span></div>
    </div>

    <div class="nextstep">
      <b>다음 단계 안내</b><br />
      1. 입력하신 이메일로 <b>학력 인증</b> 안내를 보내드립니다.<br />
      2. 운영팀이 제출하신 정보를 직접 검토합니다.<br />
      3. 승인되면 출시 소식과 함께 개별적으로 연락드립니다.
    </div>

    <p style="margin-top:34px"><a class="back" href="index.html">← 메인으로</a></p>
  </div>

  <footer class="footer">
    <div>© 2026 RnD</div>
  </footer>

  <script>
    // 완료 페이지: 주소의 ?pos=숫자 가 있으면 순번 표시 (중계기가 순번을 돌려주면 자동 작동)
    (function () {
      var params = new URLSearchParams(window.location.search);
      var pos = params.get("pos");
      if (pos) {
        document.getElementById("qnum-v").textContent = "#" + pos;
        var note = document.querySelector(".qnum .note");
        if (note) note.style.display = "none";
      }
    })();
  </script>
</body>
</html>
