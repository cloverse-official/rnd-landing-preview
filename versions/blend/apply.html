<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사전가입 신청 — RnD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../shared/base.css" />
  <link rel="stylesheet" href="blend.css" />
</head>
<body>
  <nav class="nav">
    <div class="inner">
      <a class="brand-logo" href="index.html">
        <span class="logo-mark"><img src="../shared/rnd-logo.png" alt="RnD" /></span>
        <span class="wordmark">RnD</span>
      </a>
    </div>
  </nav>

  <div class="apply-wrap">
    <a class="back" href="index.html">← 돌아가기</a>
    <div class="apply-head">
      <p class="kicker">1기 사전가입</p>
      <h1>몇 가지만 확인하면,<br />당신의 자리가 준비됩니다.</h1>
      <p>제출하신 정보는 운영팀이 직접 검토합니다. 신청은 약 2분이면 끝나요.</p>
    </div>

    <div class="card">
      <form id="signup-form" novalidate>
        <div class="field"><label>이름 <span class="req">*</span></label><input type="text" name="이름" placeholder="예) 김알앤디" /></div>
        <div class="field"><label>학력단계 <span class="req">*</span></label>
          <select name="학력단계" id="edu-level">
            <option value="">선택하세요</option>
            <option value="석사재학">석사 재학</option>
            <option value="석사졸업">석사 졸업</option>
            <option value="박사재학">박사 재학</option>
            <option value="박사졸업">박사 졸업</option>
          </select>
        </div>

        <div class="form-group-label">학력 정보</div>
        <div class="field"><label>학부 대학교 <span class="req">*</span></label><input type="text" name="학부_대학교" placeholder="예) ○○대학교" /></div>
        <div class="field"><label>학부 전공 <span class="req">*</span></label><input type="text" name="학부_전공" placeholder="예) 경제학" /></div>
        <div class="field"><label>석사 대학교 <span class="req">*</span></label><input type="text" name="석사_대학교" placeholder="예) ○○대학교" /></div>
        <div class="field"><label>석사 전공 <span class="req">*</span></label><input type="text" name="석사_전공" placeholder="예) 경영학" /></div>
        <div id="phd-fields" hidden>
          <div class="field"><label>박사 대학교 <span class="req">*</span></label><input type="text" name="박사_대학교" placeholder="예) ○○대학교" /></div>
          <div class="field"><label>박사 전공 <span class="req">*</span></label><input type="text" name="박사_전공" placeholder="예) 통계학" /></div>
        </div>

        <div class="form-group-label">연락처 · 프로필</div>
        <div class="field" id="email-field">
          <label>이메일 <span class="req">*</span> <span class="note">(재학=학교 / 졸업=직장 이메일)</span></label>
          <div class="verify-row">
            <input type="email" name="이메일" id="email" placeholder="name@university.ac.kr" />
            <button type="button" class="btn-verify" id="send-code">인증번호 받기</button>
          </div>
          <div class="verify-code" id="code-row" hidden>
            <input type="text" id="email-code" inputmode="numeric" maxlength="6" placeholder="인증번호 6자리" />
            <button type="button" class="btn-verify" id="check-code">확인</button>
          </div>
          <div class="verify-msg" id="verify-msg"></div>
        </div>
        <div class="field"><label>전화번호 <span class="req">*</span> <span class="note">(숫자만)</span></label><input type="text" name="전화번호" id="phone" inputmode="numeric" placeholder="01012345678" /></div>
        <div class="field"><label>성별 <span class="req">*</span></label>
          <select name="성별"><option value="">선택하세요</option><option value="남성">남성</option><option value="여성">여성</option></select>
        </div>
        <div class="field"><label>키 (cm) <span class="req">*</span></label><input type="number" name="키" id="height" min="140" max="220" placeholder="175" /></div>

        <div class="form-group-label">당신을 한 줄로</div>
        <div class="field"><label>나를 한 줄로 표현하면? <span class="req">*</span></label><input type="text" name="한줄소개" id="intro" maxlength="50" placeholder="20자 이상 자유롭게 적어주세요" /><div class="counter" id="intro-counter">0 / 50자 (최소 20자)</div></div>
        <div class="field"><label>이상형을 한 줄로 표현하면? <span class="req">*</span></label><input type="text" name="한줄이상형" id="ideal" maxlength="50" placeholder="20자 이상 자유롭게 적어주세요" /><div class="counter" id="ideal-counter">0 / 50자 (최소 20자)</div></div>
        <button type="submit">사전가입 신청하기</button>
        <div id="msg"></div>
      </form>
      <div class="privacy-note">입력 정보는 안전하게 보관되며, 검증 용도로만 사용됩니다.</div>
    </div>
  </div>

  <script src="apply.js"></script>
</body>
</html>
